name: Deploy docs

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/docs
      - uses: actions/deploy-pages@v4
        id: deployment
